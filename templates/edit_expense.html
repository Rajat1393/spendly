{% extends "base.html" %}

{% block title %}Edit Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<div class="expense-form-page">
    <div class="expense-form-card">

        <div class="expense-form-header">
            <h1 class="expense-form-title">Edit Expense</h1>
            <p class="expense-form-subtitle">Update the details of this transaction.</p>
        </div>

        <form class="expense-form" method="POST" action="{{ url_for('edit_expense', id=expense['id']) }}">

            <div class="form-group">
                <label class="form-label" for="amount">Amount (₹)</label>
                <input
                    class="form-input"
                    type="number"
                    id="amount"
                    name="amount"
                    step="0.01"
                    min="0.01"
                    placeholder="0.00"
                    value="{{ form.get('amount', '') }}"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="category">Category</label>
                <select class="form-select" id="category" name="category" required>
                    <option value="" disabled {% if not form.get('category') %}selected{% endif %}>Select a category</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="date">Date</label>
                <input
                    class="form-input"
                    type="date"
                    id="date"
                    name="date"
                    value="{{ form.get('date', '') }}"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description <span class="form-label-optional">(optional)</span></label>
                <textarea
                    class="form-textarea"
                    id="description"
                    name="description"
                    maxlength="200"
                    placeholder="e.g. Lunch at cafe"
                >{{ form.get('description', '') }}</textarea>
            </div>

            <div class="expense-form-actions">
                <a href="{{ url_for('profile') }}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
